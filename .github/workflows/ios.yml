name: Mobile Tests

on:
  pull_request:
    paths:
      - "apps/mobile/ios/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Run mobile tests
        run: pnpm test:mobile
