repos:
  - repo: local
    hooks:
      - id: formatter
        name: formatter
        entry: pnpm format
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss]
        pass_filenames: false
      - id: typescript-check
        name: typescript-check
        entry: pnpm typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash scripts/trufflehog-pre-commit.sh
        language: system
        pass_filenames: false
        stages: ["pre-commit", "pre-push"]
